name: Deploy Apigee Proxy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Modules/apigee/proxies

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Google Auth
        env:
          SA_KEY: ${{ secrets.APIGEE_SA_KEY }}
        run: |
          echo "${SA_KEY}" > /tmp/sa_key.json
          cat /tmp/sa_key.json | python3 -c "import sys,json; json.load(sys.stdin); print('JSON is valid')"
          gcloud auth activate-service-account \
            --key-file=/tmp/sa_key.json \
            --project=apt-advantage-495505-k1

      - name: Build and Deploy Apigee Proxy
        run: |
          TOKEN=$(gcloud auth print-access-token)
          echo "Token length: ${#TOKEN}"
          mvn clean install -Peval \
            -Dorg=apt-advantage-495505-k1 \
            -Denv=eval \
            -Dbearer=${TOKEN} \
            -Dapigee.options=override
